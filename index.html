<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Flash Cards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Baby Flash Cards</h1>
        <p id="language-info"></p>
      </header>

      <section class="card-wrap" aria-live="polite">
        <article class="card" id="card">
          <div class="image-panel">
            <img id="word-image" src="" alt="" />
          </div>
          <div class="text-panel">
            <button class="word word-en" id="word-en" type="button"></button>
            <button class="word word-local" id="word-local" type="button"></button>
            <p class="hint">Tap either word to hear native pronunciation.</p>
          </div>
        </article>
      </section>

      <nav class="controls">
        <button id="prev" type="button">◀ Prev</button>
        <button id="next" type="button">Next ▶</button>
      </nav>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
